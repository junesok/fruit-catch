<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fruit Catch</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── SCREEN 1: Start ── -->
  <div id="screen-start" class="screen active">
    <div class="start-inner">
      <p class="eyebrow">Hand Motion Game</p>
      <h1>Fruit<br>Catch</h1>
      <p class="desc">손을 카메라에 보여주고<br>바구니를 움직여 과일을 담으세요.</p>

      <!-- Mode selector -->
      <div class="mode-selector">
        <button class="mode-btn active" data-mode="1p">1 Player</button>
        <button class="mode-btn" data-mode="2p">2 Players</button>
      </div>

      <!-- Time selector -->
      <div class="time-selector">
        <button class="time-btn active" data-time="10">10s</button>
        <button class="time-btn" data-time="30">30s</button>
        <button class="time-btn" data-time="60">60s</button>
      </div>

      <button id="btn-start" class="primary-btn">시작하기</button>
      <p class="cam-note" id="cam-status">카메라 권한이 필요합니다.</p>
    </div>
  </div>

  <!-- ── SCREEN 2: Game ── -->
  <div id="screen-game" class="screen">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="game-canvas"></canvas>

    <!-- 1P HUD -->
    <div id="hud">
      <div id="hud-score">
        <span class="hud-label">Score</span>
        <span id="score-value">0</span>
      </div>
      <div id="hud-timer">
        <span class="hud-label">Time</span>
        <span id="timer-value">--</span>
      </div>
    </div>

    <!-- 2P HUD -->
    <div id="hud-2p" style="display:none">
      <div class="hud-player" id="hud-p1-box">
        <span class="hud-label">Player 1</span>
        <span id="score-p1">0</span>
      </div>
      <div class="hud-center">
        <span class="hud-label">Time</span>
        <span id="timer-value-2p">--</span>
      </div>
      <div class="hud-player" id="hud-p2-box">
        <span class="hud-label">Player 2</span>
        <span id="score-p2">0</span>
      </div>
    </div>

    <!-- Hand indicator -->
    <div id="hand-indicator">
      <span id="hand-dot"></span>
      <span id="hand-label">손 인식 중...</span>
    </div>
  </div>

  <!-- ── SCREEN 3: Result ── -->
  <div id="screen-result" class="screen">
    <div class="result-inner">
      <p class="eyebrow">Game Over</p>

      <!-- 1P result -->
      <div id="result-1p">
        <h2 id="result-score">0</h2>
        <p class="result-sub">개의 과일을 담았어요</p>
        <div class="result-breakdown" id="result-breakdown"></div>
      </div>

      <!-- 2P result -->
      <div id="result-2p" style="display:none">
        <div class="result-vs">
          <div class="result-player">
            <p class="result-player-label">Player 1</p>
            <h2 id="result-p1">0</h2>
          </div>
          <span class="vs-label">VS</span>
          <div class="result-player">
            <p class="result-player-label">Player 2</p>
            <h2 id="result-p2">0</h2>
          </div>
        </div>
        <p id="result-winner" class="result-winner"></p>
      </div>

      <div class="result-actions">
        <button id="btn-retry" class="primary-btn">다시 하기</button>
        <button id="btn-home" class="secondary-btn">처음으로</button>
      </div>
    </div>
  </div>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script src="hand-tracker.js"></script>
  <script src="game.js"></script>
</body>
</html>
